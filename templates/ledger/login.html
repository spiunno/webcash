<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — WebCash</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border: 1px solid #dde2ea;
      border-radius: 10px;
      padding: 40px 44px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
    }
    .logo { font-size: 1.6rem; font-weight: 800; color: #1e2a38; margin-bottom: 6px; }
    .tagline { font-size: .85rem; color: #7f8fa4; margin-bottom: 30px; }
    label { display: block; font-size: .83rem; font-weight: 600; margin-bottom: 5px; color: #2c3e50; }
    input[type=text], input[type=password] {
      width: 100%; padding: 9px 12px;
      border: 1px solid #dde2ea; border-radius: 6px;
      font-size: .9rem; outline: none; margin-bottom: 16px;
      transition: border-color .15s;
    }
    input:focus { border-color: #3d8ef8; }
    .btn {
      width: 100%; padding: 10px;
      background: #3d8ef8; color: #fff;
      border: none; border-radius: 6px;
      font-size: .9rem; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }
    .btn:hover { background: #2d7de8; }
    .error {
      background: #fdeaea; color: #8b1a1a;
      border-left: 4px solid #e05252;
      padding: 9px 14px; border-radius: 5px;
      font-size: .84rem; margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">💰 WebCash</div>
    <div class="tagline">Family finance ledger</div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autofocus autocomplete="username">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password">

      <button type="submit" class="btn">Sign in</button>
    </form>
  </div>
</body>
</html>
